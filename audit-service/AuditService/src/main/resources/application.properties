spring.application.name=AuditService
# Puerto del Audit Service
server.port=2021

# Base de datos propia del Audit Service
spring.datasource.url=jdbc:mysql://localhost:3306/audit_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate = JPA verifica que las tablas existan pero NO las crea
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT ? misma clave que Auth Service
jwt.secret=smcft_clave_super_secreta_2025_sistema_fronterizo

# URL del User Service ? para verificar que el auditor existe
userservice.url=http://localhost:2031

# Nivel de log para tu paquete principal
logging.level.com.example.AuditService=DEBUG

# Nivel global de informacion
logging.level.root=INFO

# Nombre del archivo de salida (texto plano opcional)
logging.file.name=logs/audit-service.log

# ===================================================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI (REDIRECCIÓN NATIVA DEL GATEWAY)
# ===================================================================
springdoc.api-docs.path=/api/v1/audits/v3/api-docs