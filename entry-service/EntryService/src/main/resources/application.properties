spring.application.name=EntryService
# Puerto del Entry Service
server.port=2025

# Base de datos propia del Entry Service
spring.datasource.url=jdbc:mysql://localhost:3306/entry_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate = JPA verifica que las tablas existan pero NO las crea
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway ejecuta los scripts autom�ticamente al iniciar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# URL del Vehicle Service ? Entry Service actualiza el estado
# del veh�culo a EN_TERRITORIO_NACIONAL cuando regresa al pa�s
vehicleservice.url=http://localhost:2032

jwt.secret=smcft_clave_super_secreta_2025_sistema_fronterizo

# Configuraci�n de niveles de Log
logging.level.root=INFO
logging.level.com.example.EntryService=DEBUG

# Nombre del archivo de salida
logging.file.name=logs/entry-service.log

# Swagger/OpenAPI configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
