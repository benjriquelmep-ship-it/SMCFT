# ============================================================
# CONFIGURACION BASE DEL MICROSERVICIO ENTRYSERVICE
# ============================================================

# Nombre identificador del microservicio en el ecosistema SMCFT
spring.application.name=EntryService

# ============================================================
# CONEXION A BASE DE DATOS
# ============================================================
# Base de datos de ingresos - almacena declaraciones de entrada al pais
# Cada microservicio tiene su propia base de datos independiente
spring.datasource.url=jdbc:mysql://localhost:3306/entry_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
# validate = JPA verifica que las tablas existan pero NO las crea
# Flyway es quien crea las tablas mediante los scripts SQL
spring.jpa.hibernate.ddl-auto=validate
# Muestra las consultas SQL generadas por Hibernate en la consola
spring.jpa.show-sql=true
# Formatea las consultas SQL para que sean legibles
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# FLYWAY - MIGRACIONES DE BASE DE DATOS
# ============================================================
# Ejecuta automaticamente los scripts SQL de db/migration al iniciar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# PUERTO DEL SERVIDOR
# ============================================================
# Cada microservicio tiene un puerto unico para no colisionar
server.port=2025

# ============================================================
# JWT - SEGURIDAD
# ============================================================
# Clave secreta para firmar y verificar los tokens JWT
# En produccion debe ir en variable de entorno, nunca hardcodeado
jwt.secret=smcft_clave_super_secreta_2025_sistema_fronterizo

# ============================================================
# LOGGING
# ============================================================
# Niveles de log: INFO para Spring Boot, DEBUG para el codigo del servicio
logging.level.root=INFO
logging.level.com.example.EntryService=DEBUG
# Archivo de salida de logs para este servicio
logging.file.name=logs/entry-service.log

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
# Expone el JSON de especificacion OpenAPI en la ruta que el Gateway espera
springdoc.api-docs.path=/api/v1/entries/v3/api-docs

# ============================================================
# COMUNICACION INTER-SERVICIOS
# ============================================================
# Vehicle Service - actualiza estado del vehiculo a EN_TERRITORIO_NACIONAL al regresar
vehicleservice.url=http://vehicle-service:2032

# EUREKA
eureka.client.serviceUrl.defaultZone=http://localhost:8760/eureka
eureka.instance.preferIpAddress=true

springdoc.enable-hateoas=false

springdoc.api-docs.path=/api/v1/entries/v3/api-docs
