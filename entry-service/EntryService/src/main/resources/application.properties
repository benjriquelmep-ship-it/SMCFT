spring.application.name=EntryService
# Puerto del Entry Service
server.port=8085

# Base de datos propia del Entry Service
spring.datasource.url=jdbc:mysql://localhost:3306/entry_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate = JPA verifica que las tablas existan pero NO las crea
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway ejecuta los scripts automáticamente al iniciar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# URL del Vehicle Service ? Entry Service actualiza el estado
# del vehículo a EN_TERRITORIO_NACIONAL cuando regresa al país
vehicleservice.url=http://localhost:8083
