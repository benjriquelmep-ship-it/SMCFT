services:

  mysql-db:
    image: mysql:8.0
    container_name: smcft-mysql
    environment:
      MYSQL_ROOT_PASSWORD: smcft_root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - smcft-network

  eureka-server:
    build: ./eureka-server
    container_name: smcft-eureka
    ports:
      - "8760:8760"
    networks:
      - smcft-network

  gateway:
    build: ./gateway
    container_name: smcft-gateway
    ports:
      - "2020:2020"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8760/eureka
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - smcft-network

  audit-service:
    build: ./audit-service/AuditService
    container_name: smcft-audit
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/audit_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: smcft
      SPRING_DATASOURCE_PASSWORD: smcft_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8760/eureka
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - smcft-network

  auth-service:
    build: ./auth-service/AuthService
    container_name: smcft-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: smcft
      SPRING_DATASOURCE_PASSWORD: smcft_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8760/eureka
      USERSERVICE_URL: http://user-service:2031
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - smcft-network

