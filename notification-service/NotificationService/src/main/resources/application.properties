spring.application.name=NotificationService
# Puerto del Notification Service
server.port=2027

# Base de datos propia del Notification Service
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate = JPA verifica que las tablas existan pero NO las crea
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT ? misma clave que Auth Service
jwt.secret=smcft_clave_super_secreta_2025_sistema_fronterizo

# URL del Deadline Service
deadlineservice.url=http://localhost:2024
# URL del User Service
userservice.url=http://localhost:2031
# Configuracion de Niveles de Log
logging.level.root=INFO
logging.level.com.example.NotificationService=DEBUG

# Archivo de salida en la carpeta centralizada de SMCFT
logging.file.name=logs/notification-service.log

springdoc.api-docs.path=/api/v1/notifications/v3/api-docs