spring.application.name=SanitaryService
# Puerto del Sanitary Service
server.port=8086

# Base de datos propia del Sanitary Service
spring.datasource.url=jdbc:mysql://localhost:3306/sanitary_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate = JPA verifica que las tablas existan pero NO las crea
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT ? misma clave que Auth Service
jwt.secret=smcft_clave_super_secreta_2025_sistema_fronterizo

# URL del Vehicle Service ? para verificar el vehículo
vehicleservice.url=http://localhost:8083
