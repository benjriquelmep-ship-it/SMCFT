spring.application.name=DeadlineService
# Puerto del Deadline Service
server.port=2024

# Base de datos propia del Deadline Service
spring.datasource.url=jdbc:mysql://localhost:3306/deadline_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate = JPA verifica que las tablas existan pero NO las crea
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT ? misma clave que Auth Service
jwt.secret=smcft_clave_super_secreta_2025_sistema_fronterizo

# URL del Entry Service
entryservice.url=http://localhost:2025

# Configuracion de Logging
logging.level.root=INFO
logging.level.com.example.DeadlineService=DEBUG

# Archivo de salida
logging.file.name=logs/deadline-service.log

# ===================================================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI (REDIRECCIÓN NATIVA DEL GATEWAY)
# ===================================================================
springdoc.api-docs.path=/api/v1/deadline-alerts/v3/api-docs